<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Welcome</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,sans-serif;display:grid;place-items:center;min-height:100vh;background:linear-gradient(-45deg,#4f46e5,#06b6d4,#8b5cf6,#0ea5e9);background-size:400% 400%;animation:bg 15s ease infinite;color:#fff;overflow:hidden}.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.35;animation:float 8s ease-in-out infinite}.o1{width:220px;height:220px;background:#fff;top:10%;left:10%}.o2{width:180px;height:180px;background:#a5f3fc;right:10%;bottom:10%;animation-delay:2s}.card{position:relative;z-index:1;max-width:760px;margin:20px;padding:56px;border-radius:24px;background:rgba(255,255,255,.12);backdrop-filter:blur(14px);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}h1{font-size:clamp(2.5rem,6vw,4.5rem);margin:0}p{font-size:1.1rem;opacity:.9;line-height:1.6}.btn{display:inline-block;margin-top:24px;padding:14px 28px;background:#fff;color:#4f46e5;text-decoration:none;border-radius:999px;font-weight:700;transition:.25s}.btn:hover{transform:translateY(-3px) scale(1.05)}@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}@keyframes float{50%{transform:translateY(-25px)}}</style></head><body><div class='orb o1'></div><div class='orb o2'></div><div class='card'><h1>🚀 Hello, World!</h1><p>This site is hosted with <b>GitHub Pages</b>.<br>Built using a single HTML file with modern CSS animations.</p><a class='btn' href='https://github.com/knizam26/static-web-test' target='_blank'>View Repository</a></div></body></html>
